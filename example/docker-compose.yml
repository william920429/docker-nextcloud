services:
  postgres:
    image: postgres:17
    container_name: nextcloud-postgres
    restart: unless-stopped
    shm_size: 256MB
    volumes:
      - postgres:/var/lib/postgresql/data
    tmpfs:
      - /run
    environment:
      - POSTGRES_INITDB_ARGS=--data-checksums
      - TZ
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB}", "-U", "${POSTGRES_USER}"]
      start_period: 30s
      timeout: 3s

  valkey:
    image: valkey/valkey:9
    container_name: nextcloud-valkey
    restart: unless-stopped
    environment:
      - VALKEY_EXTRA_FLAGS=--save "" --appendonly no
      - TZ
    healthcheck:
      test: ["CMD", "valkey-cli", "PING"]
      start_period: 30s
      timeout: 3s

  imaginary:
    image: ghcr.io/nextcloud-releases/aio-imaginary:latest
    container_name: nextcloud-imaginary
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    entrypoint: imaginary -p 9000 -return-size -max-allowed-resolution 222.2
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "9000"]
      start_period: 30s
      timeout: 3s

  app:
    image: ghcr.io/william920429/nextcloud:latest
    container_name: nextcloud-app
    restart: unless-stopped
    # Uncomment to enable dri device (VA-API)
    # devices:
    #   - /dev/dri:/dev/dri
    volumes:
      - html:/var/www/html
      - cache:/var/www/cache
      # - /somewhere/my/data/store:/var/www/html/data
    tmpfs:
      - /tmp:exec
    env_file: .env
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "80"]
      start_period: 30s
      timeout: 3s
    depends_on:
      - postgres
      - valkey

  cron:
    image: ghcr.io/william920429/nextcloud:latest
    container_name: nextcloud-cron
    restart: unless-stopped
    command: supercronic -quiet /crontab
    # Uncomment to enable dri device (VA-API)
    # devices:
    #   - /dev/dri:/dev/dri
    tmpfs:
      - /tmp:exec
    env_file: .env
    healthcheck:
      test: ["CMD", "/healthcheck-cron.sh"]
      start_period: 5m
      timeout: 3s
    volumes_from:
      - app

  web:
    image: ghcr.io/william920429/nextcloud:latest
    container_name: nextcloud-web
    restart: unless-stopped
    command: nginx -g 'daemon off;'
    environment:
      - PUID
      - PGID
      - NEXTCLOUD_HOST
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "80"]
      start_period: 30s
      timeout: 3s
    ports:
      - 21800:80
    volumes_from:
      - app:ro

  notifypush:
    image: ghcr.io/william920429/nextcloud:latest
    container_name: nextcloud-notifypush
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    command: notify_push
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}/${POSTGRES_DB}
      - DATABASE_PREFIX=oc_
      - REDIS_URL=redis://${REDIS_HOST}
      - NEXTCLOUD_URL=http://${NGINX_HOST}
      - NGINX_HOST
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "7867"]
      start_period: 30s
      timeout: 3s
    volumes_from:
      - app:ro

volumes:
  html:
  cache:
  postgres:
